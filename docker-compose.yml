services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "5050:5000"
    environment:
      PORT: "5000"
      MONGO_URI: mongodb://mongo:27017/cfo_dashboard
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      API_ORIGIN: http://server:5000
    depends_on:
      - server

volumes:
  mongo_data:
